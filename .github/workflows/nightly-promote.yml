name: Nightly Promote

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: nightly-promote
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dev
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Rust tests
        run: cargo test --manifest-path Cargo.toml

      - name: Web checks
        run: npm run check:web

      - name: Web build
        run: npm run build:web

      - name: Detect pending promotion
        id: diff
        run: |
          git fetch origin main dev
          mapfile -t commits < <(git rev-list --reverse --right-only --cherry-pick origin/main...origin/dev)
          if [ "${#commits[@]}" -eq 0 ]; then
            echo "pending=false" >> "$GITHUB_OUTPUT"
          else
            echo "pending=true" >> "$GITHUB_OUTPUT"
            {
              echo 'commits<<EOF'
              printf '%s\n' "${commits[@]}"
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Close stale promotion PR
        if: steps.diff.outputs.pending != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          existing="$(gh pr list --base main --head promote/dev-to-main --state open --json number --jq '.[0].number')"
          if [ -n "$existing" ]; then
            gh pr close "$existing" --comment 'Closing stale promotion PR because `main` already contains the patch set from `dev`.'
          fi

      - name: Build promotion branch
        if: steps.diff.outputs.pending == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git checkout -B promote/dev-to-main origin/main

          while IFS= read -r commit; do
            [ -n "$commit" ] || continue
            git cherry-pick -x "$commit"
          done <<'EOF'
          ${{ steps.diff.outputs.commits }}
          EOF

          git push --force-with-lease origin HEAD:promote/dev-to-main

      - name: Close legacy promotion PR
        if: steps.diff.outputs.pending == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          existing="$(gh pr list --base main --head dev --state open --json number --jq '.[0].number')"
          if [ -n "$existing" ]; then
            gh pr close "$existing" --comment 'Superseded by the patch-based `promote/dev-to-main` workflow.'
          fi

      - name: Create or update promotion PR
        if: steps.diff.outputs.pending == 'true'
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          existing="$(gh pr list --base main --head promote/dev-to-main --state open --json number --jq '.[0].number')"
          if [ -n "$existing" ]; then
            gh pr edit "$existing" \
              --title 'chore: promote dev to main' \
              --body 'Nightly promotion from `dev` after CI passed. This PR is cut from `main` and cherry-picks the patch-unique commits from `dev`.'
            echo "number=$existing" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          gh pr create \
            --base main \
            --head promote/dev-to-main \
            --title 'chore: promote dev to main' \
            --body 'Nightly promotion from `dev` after CI passed. This PR is cut from `main` and cherry-picks the patch-unique commits from `dev`.'

          number="$(gh pr list --base main --head promote/dev-to-main --state open --json number --jq '.[0].number')"
          echo "number=$number" >> "$GITHUB_OUTPUT"

      - name: Enable auto-merge on promotion PR
        if: steps.diff.outputs.pending == 'true' && steps.pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr merge "${{ steps.pr.outputs.number }}" --squash --auto
