name: Nightly Promote

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      bootstrap_sha:
        description: >-
          Optional dev commit SHA to use as the initial promotion cursor when the
          remote cursor tag does not exist yet.
        required: false
        type: string

permissions:
  checks: write
  contents: write
  pull-requests: write

concurrency:
  group: nightly-promote
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  PROMOTION_BRANCH: promote/dev-to-main
  # This tag points at the latest dev commit that has successfully landed in main.
  PROMOTION_CURSOR_TAG: promotion/dev-last-promoted

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dev
        uses: actions/checkout@v6
        with:
          ref: dev
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Rust tests
        run: cargo test --manifest-path Cargo.toml

      - name: Web checks
        run: npm run check:web

      - name: Web build
        run: npm run build:web

      - name: Resolve promotion cursor
        id: cursor
        env:
          BOOTSTRAP_SHA: ${{ github.event.inputs.bootstrap_sha || '' }}
        run: |
          set -euo pipefail

          git fetch origin main dev
          git fetch origin "refs/tags/${PROMOTION_CURSOR_TAG}:refs/tags/${PROMOTION_CURSOR_TAG}" || true

          if git rev-parse -q --verify "refs/tags/${PROMOTION_CURSOR_TAG}^{commit}" >/dev/null; then
            cursor_sha="$(git rev-parse "refs/tags/${PROMOTION_CURSOR_TAG}^{commit}")"
            cursor_source="tag"
          elif [ -n "${BOOTSTRAP_SHA}" ]; then
            cursor_sha="${BOOTSTRAP_SHA}"
            cursor_source="workflow_dispatch bootstrap"
          else
            echo "::error::Promotion cursor tag refs/tags/${PROMOTION_CURSOR_TAG} does not exist."
            echo "::error::Manually dispatch this workflow once with bootstrap_sha set to the last dev commit already promoted into main."
            exit 1
          fi

          git rev-parse --verify "${cursor_sha}^{commit}" >/dev/null

          if ! git merge-base --is-ancestor "${cursor_sha}" origin/dev; then
            echo "::error::Promotion cursor ${cursor_sha} is not an ancestor of origin/dev."
            exit 1
          fi

          if [ "${cursor_source}" = "workflow_dispatch bootstrap" ]; then
            ./scripts/validate-promotion-bootstrap.sh \
              --main-ref origin/main \
              --dev-ref origin/dev \
              --bootstrap-sha "${cursor_sha}"
          fi

          target_sha="$(git rev-parse origin/dev)"

          {
            echo "cursor_sha=${cursor_sha}"
            echo "cursor_short=$(git rev-parse --short "${cursor_sha}")"
            echo "cursor_source=${cursor_source}"
            echo "target_sha=${target_sha}"
            echo "target_short=$(git rev-parse --short "${target_sha}")"
          } >> "$GITHUB_OUTPUT"

      - name: Detect pending promotion
        id: diff
        run: |
          set -euo pipefail

          # The cursor tag is the durable source of truth for what dev commit range
          # has already landed in main. This keeps promotion deterministic even when
          # the promotion PR itself is squash-merged.
          mapfile -t commits < <(
            git rev-list \
              --reverse \
              --ancestry-path \
              "${{ steps.cursor.outputs.cursor_sha }}..origin/dev"
          )

          echo "commit_count=${#commits[@]}" >> "$GITHUB_OUTPUT"

          if [ "${#commits[@]}" -eq 0 ]; then
            echo "pending=false" >> "$GITHUB_OUTPUT"
          else
            echo "pending=true" >> "$GITHUB_OUTPUT"
            {
              echo 'commits<<EOF'
              printf '%s\n' "${commits[@]}"
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Close stale promotion PR
        if: steps.diff.outputs.pending != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          existing="$(gh pr list --base main --head "${PROMOTION_BRANCH}" --state open --json number --jq '.[0].number')"
          if [ -n "${existing}" ]; then
            gh pr close "${existing}" --comment 'Closing stale promotion PR because the promotion cursor is already at origin/dev.'
          fi

      - name: Build promotion branch
        if: steps.diff.outputs.pending == 'true'
        id: promotion_branch
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "${PROMOTION_BRANCH}" origin/main

          while IFS= read -r commit; do
            [ -n "${commit}" ] || continue

            echo "::group::Cherry-pick ${commit}"
            if git cherry-pick -x "${commit}"; then
              echo "::endgroup::"
              continue
            fi

            if git diff --quiet && git diff --cached --quiet; then
              git cherry-pick --skip
              echo "::endgroup::"
              continue
            fi

            echo "::error::Cherry-pick failed for ${commit}."
            conflicted="$(git diff --name-only --diff-filter=U || true)"
            if [ -n "${conflicted}" ]; then
              echo "::error::Conflicted files:"
              printf '%s\n' "${conflicted}"
            fi
            git status --short
            echo "::endgroup::"
            exit 1
          done <<'EOF'
          ${{ steps.diff.outputs.commits }}
          EOF

          git push --force-with-lease origin "HEAD:${PROMOTION_BRANCH}"
          echo "promotion_head_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Verify promotion branch Rust
        if: steps.diff.outputs.pending == 'true'
        id: promotion_rust
        continue-on-error: true
        run: |
          set -euo pipefail
          cargo fmt --all --check
          cargo test --manifest-path Cargo.toml

      - name: Verify promotion branch Web
        if: steps.diff.outputs.pending == 'true'
        id: promotion_web
        continue-on-error: true
        run: |
          set -euo pipefail
          npm ci
          npm run check:web
          npm run build:web

      - name: Publish promotion branch check-runs
        if: steps.diff.outputs.pending == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PROMOTION_HEAD_SHA: ${{ steps.promotion_branch.outputs.promotion_head_sha }}
          RUST_CONCLUSION: ${{ steps.promotion_rust.outcome == 'success' && 'success' || 'failure' }}
          WEB_CONCLUSION: ${{ steps.promotion_web.outcome == 'success' && 'success' || 'failure' }}
        run: |
          set -euo pipefail

          publish_check() {
            local name="$1"
            local conclusion="$2"
            local summary="$3"

            jq -n \
              --arg name "${name}" \
              --arg sha "${PROMOTION_HEAD_SHA}" \
              --arg conclusion "${conclusion}" \
              --arg details_url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              --arg summary "${summary}" \
              '{
                name: $name,
                head_sha: $sha,
                status: "completed",
                conclusion: $conclusion,
                details_url: $details_url,
                output: {
                  title: "Nightly Promote branch verification",
                  summary: $summary
                }
              }' \
              | gh api \
                  --method POST \
                  -H "Accept: application/vnd.github+json" \
                  "repos/${{ github.repository }}/check-runs" \
                  --input -
          }

          publish_check \
            "Rust" \
            "${RUST_CONCLUSION}" \
            "Verified \`cargo fmt --all --check\` and \`cargo test --manifest-path Cargo.toml\` on \`${PROMOTION_BRANCH}\`."

          publish_check \
            "Web" \
            "${WEB_CONCLUSION}" \
            "Verified \`npm run check:web\` and \`npm run build:web\` on \`${PROMOTION_BRANCH}\`."

      - name: Require promotion branch verification
        if: steps.diff.outputs.pending == 'true'
        run: |
          set -euo pipefail

          rust_outcome="${{ steps.promotion_rust.outcome }}"
          web_outcome="${{ steps.promotion_web.outcome }}"

          if [ "${rust_outcome}" != "success" ] || [ "${web_outcome}" != "success" ]; then
            echo "::error::Promotion branch verification failed."
            echo "::error::Rust outcome: ${rust_outcome}"
            echo "::error::Web outcome: ${web_outcome}"
            exit 1
          fi

      - name: Close legacy promotion PR
        if: steps.diff.outputs.pending == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          existing="$(gh pr list --base main --head dev --state open --json number --jq '.[0].number')"
          if [ -n "${existing}" ]; then
            gh pr close "${existing}" --comment 'Superseded by the cursor-based `promote/dev-to-main` workflow.'
          fi

      - name: Create or update promotion PR
        if: steps.diff.outputs.pending == 'true'
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          body_file="$(mktemp)"
          cat > "${body_file}" <<EOF
          Nightly promotion from \`dev\` after CI passed.

          This PR is cut from \`main\` and cherry-picks the exact \`dev\` commit range
          described by the durable promotion cursor.

          <!-- promotion-cursor-tag: ${PROMOTION_CURSOR_TAG} -->
          <!-- promotion-cursor-base-sha: ${{ steps.cursor.outputs.cursor_sha }} -->
          <!-- promotion-target-dev-sha: ${{ steps.cursor.outputs.target_sha }} -->

          - Cursor tag: \`${PROMOTION_CURSOR_TAG}\`
          - Cursor base: \`${{ steps.cursor.outputs.cursor_short }}\`
          - Target dev head: \`${{ steps.cursor.outputs.target_short }}\`
          - Commits in this promotion: \`${{ steps.diff.outputs.commit_count }}\`

          The promotion cursor advances only after this PR merges successfully.
          EOF

          existing="$(gh pr list --base main --head "${PROMOTION_BRANCH}" --state open --json number --jq '.[0].number')"
          if [ -n "${existing}" ]; then
            jq -n \
              --rawfile body "${body_file}" \
              '{
                title: "chore: promote dev to main",
                body: $body
              }' \
              | gh api \
                  --method PATCH \
                  -H "Accept: application/vnd.github+json" \
                  "repos/${{ github.repository }}/pulls/${existing}" \
                  --input -
            echo "number=${existing}" >> "$GITHUB_OUTPUT"
            rm -f "${body_file}"
            exit 0
          fi

          gh pr create \
            --base main \
            --head "${PROMOTION_BRANCH}" \
            --title 'chore: promote dev to main' \
            --body-file "${body_file}"

          rm -f "${body_file}"

          number="$(gh pr list --base main --head "${PROMOTION_BRANCH}" --state open --json number --jq '.[0].number')"
          echo "number=${number}" >> "$GITHUB_OUTPUT"

      - name: Enable auto-merge on promotion PR
        if: steps.diff.outputs.pending == 'true' && steps.pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          for attempt in 1 2 3; do
            if gh pr merge "${{ steps.pr.outputs.number }}" --squash --auto; then
              exit 0
            fi

            if [ "${attempt}" -lt 3 ]; then
              sleep 5
            fi
          done

          exit 1

      - name: Advance cursor after auto-merge
        if: steps.diff.outputs.pending == 'true' && steps.pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ github.token }}
          CURSOR_SHA: ${{ steps.cursor.outputs.cursor_sha }}
          TARGET_SHA: ${{ steps.cursor.outputs.target_sha }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          set -euo pipefail

          merged="false"
          for attempt in $(seq 1 60); do
            state="$(gh pr view "${PR_NUMBER}" --json state --jq '.state')"
            if [ "${state}" = "MERGED" ]; then
              merged="true"
              break
            fi

            if [ "${state}" = "CLOSED" ]; then
              echo "::error::Promotion PR #${PR_NUMBER} closed without merging."
              exit 1
            fi

            sleep 10
          done

          if [ "${merged}" != "true" ]; then
            echo "::error::Promotion PR #${PR_NUMBER} did not merge before the cursor wait timed out."
            exit 1
          fi

          git fetch origin main dev
          git fetch origin "refs/tags/${PROMOTION_CURSOR_TAG}:refs/tags/${PROMOTION_CURSOR_TAG}" || true

          git rev-parse --verify "${CURSOR_SHA}^{commit}" >/dev/null
          git rev-parse --verify "${TARGET_SHA}^{commit}" >/dev/null

          if ! git merge-base --is-ancestor "${CURSOR_SHA}" "${TARGET_SHA}"; then
            echo "::error::Promotion target ${TARGET_SHA} is behind cursor base ${CURSOR_SHA}."
            exit 1
          fi

          if ! git merge-base --is-ancestor "${TARGET_SHA}" origin/dev; then
            echo "::error::Promotion target ${TARGET_SHA} is not an ancestor of origin/dev."
            exit 1
          fi

          if git rev-parse -q --verify "refs/tags/${PROMOTION_CURSOR_TAG}^{commit}" >/dev/null; then
            current_cursor="$(git rev-parse "refs/tags/${PROMOTION_CURSOR_TAG}^{commit}")"
            if [ "${current_cursor}" = "${TARGET_SHA}" ]; then
              echo "Promotion cursor already points at ${TARGET_SHA}."
              exit 0
            fi

            if [ "${current_cursor}" != "${CURSOR_SHA}" ]; then
              echo "::error::Promotion cursor tag already moved from ${CURSOR_SHA} to ${current_cursor}."
              exit 1
            fi
          fi

          git tag -fa "${PROMOTION_CURSOR_TAG}" "${TARGET_SHA}" \
            -m "Promoted dev through ${TARGET_SHA} via #${PR_NUMBER}"
          git push --force origin "refs/tags/${PROMOTION_CURSOR_TAG}"
